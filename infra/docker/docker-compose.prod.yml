name: lifygo-prod

services:
  migrate:
    image: lifygo-api:latest
    command: [
      "/app/migrate",
      "-path", "/app/migrations",
      "-database", "${DATABASE_URL}",
      "up"
    ]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lifygo_network
    restart: on-failure

  api:
    image: lifygo-api:latest
    container_name: lifygo-api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT:                ${PORT:-8080}
      ENVIRONMENT:         production
      DATABASE_URL:        ${DATABASE_URL}
      REDIS_URL:           ${REDIS_URL}
      CLERK_SECRET_KEY:    ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      ENCRYPTION_KEY:      ${ENCRYPTION_KEY}
      AWS_REGION:          ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID:   ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SQS_QUEUE_URL:       ${SQS_QUEUE_URL}
      SQS_QUEUE_ARN:       ${SQS_QUEUE_ARN}
      SCHEDULER_ROLE_ARN:  ${SCHEDULER_ROLE_ARN}
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - lifygo_network
    deploy:
      resources:
        limits:
          memory: 256M


  postgres:
    image: postgres:16-alpine
    container_name: lifygo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-lifygo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-lifygo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifygo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifygo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M


  redis:
    image: redis:7-alpine
    container_name: lifygo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - lifygo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 96M


networks:
  lifygo_network:
    driver: bridge


volumes:
  postgres_data:
  redis_data: